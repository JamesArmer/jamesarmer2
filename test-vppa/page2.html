<!DOCTYPE html>
<html>

<head>
  <link rel="preconnect" href="https://frontend-test.secureprivacy.ai/" />

  <script src="multiple-sp.js"></script>

  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>jamesarmer2 - Page 2 (Video/VPPA)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>

<body>
  <h1>Page 2 (Video / VPPA Page)</h1>

  <p>Link back to <a href="/jamesarmer2/test-vppa/index.html">Page 1 (cookie consent)</a></p>

  <button id="clearLocalstorage" onclick="window.localStorage.clear();">
    Clear localStorage
  </button>

  <div>
    <iframe width="420" height="315" src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>
  </div>

  <p>
    <strong>localStorage state:</strong>
  </p>
  <pre id="storage-state"></pre>

  <script>
    // Display localStorage consent state for debugging
    function updateStorageDisplay() {
      const keys = ["sp_consent", "sp_cookie_consent", "sp_vppa_consent", "sp_dynamic"];
      const state = {};
      keys.forEach(key => {
        const val = localStorage.getItem(key);
        state[key] = val ? JSON.parse(val) : null;
      });
      document.getElementById("storage-state").textContent = JSON.stringify(state, null, 2);
    }
    updateStorageDisplay();
    setInterval(updateStorageDisplay, 1000);
  </script>
</body>

</html>
