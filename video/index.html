<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Video Page</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="video-wrapper">
      <video id="player" playsinline controls></video>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.js"></script>
    <script>
      const video = document.getElementById("player");
      const hls = new Hls();
      hls.loadSource("https://video.secureprivacy.ai/governance/playlist.m3u8");
      hls.attachMedia(video);
      const player = new Plyr(video);
    </script>
  </body>
</html>
